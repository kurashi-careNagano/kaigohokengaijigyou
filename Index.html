<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>訪問ケア料金計算</title>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="料金計算"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#F8F4EE;color:#2C3E35;}
    @media print{
      .no-print{display:none!important;}
      body{background:white;}
      .print-area{box-shadow:none!important;border:none!important;}
    }
  </style>
</head>
<body>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useCallback}=React;

// ===== COLORS =====
const C={
  sage:"#7A9E87",sageDark:"#4E7A5E",sageLight:"#A8C4B0",
  cream:"#F8F4EE",warm:"#FDFAF6",charcoal:"#2C3E35",
  muted:"#8A9E92",border:"#D8E4DC",red:"#C0504A",
  gold:"#C49A1A",goldLight:"#FDF3D0",blue:"#4A7FA8",
  accent:"#D4845A",green:"#2E7D52",greenLight:"#E8F5EE",
  purple:"#7A5EA8",
};

// ===== SERVICE DEFINITIONS =====
// 事業者がカスタマイズできる料金設定（初期値）
const DEFAULT_SETTINGS = {
  companyName:"",
  services:[
    {id:"s1", name:"宅内支援（〜30分）",    basePrice:1600, unit:"回",  hasTime:true,  timeUnit:30,  extraPrice:0},
    {id:"s2", name:"宅内支援（〜60分）",    basePrice:2800, unit:"回",  hasTime:true,  timeUnit:60,  extraPrice:700},
    {id:"s3", name:"買物等代行",            basePrice:1600, unit:"回",  hasTime:true,  timeUnit:30,  extraPrice:700},
    {id:"s4", name:"外出支援（車なし）",    basePrice:3000, unit:"回",  hasTime:true,  timeUnit:60,  extraPrice:750},
    {id:"s5", name:"外出支援（車あり）",    basePrice:3000, unit:"回",  hasTime:true,  timeUnit:60,  extraPrice:750},
    {id:"s6", name:"アロマケア加算",        basePrice:1000, unit:"15分", hasTime:true, timeUnit:15,  extraPrice:1000},
    {id:"s7", name:"ケアリストプラン",      basePrice:15000,unit:"回",  hasTime:false, timeUnit:0,   extraPrice:0},
  ],
  addons:[
    {id:"a1", name:"車同乗",               pricePerUnit:30,  unitLabel:"km"},
    {id:"a2", name:"遠距離加算（往復）",    pricePerUnit:1000,unitLabel:"区間"},
    {id:"a3", name:"ガソリン代（往復）",    pricePerUnit:30,  unitLabel:"km"},
    {id:"a4", name:"家族加算（軽）",        pricePerUnit:1500,unitLabel:"名"},
    {id:"a5", name:"家族加算（通常）",      pricePerUnit:2000,unitLabel:"名"},
    {id:"a6", name:"家族加算（重度）",      pricePerUnit:3000,unitLabel:"名"},
    {id:"a7", name:"緊急対応加算",          pricePerUnit:500, unitLabel:"回"},
    {id:"a8", name:"時間外加算（20%）",     pricePerUnit:0,   unitLabel:"※自動計算"},
    {id:"a9", name:"当日キャンセル料",      pricePerUnit:2800,unitLabel:"回"},
  ],
};

// ===== STYLES =====
const S={
  card:{background:"white",borderRadius:12,padding:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:`1px solid ${C.border}`},
  title:{fontSize:14,fontWeight:700,color:C.sageDark,marginBottom:10},
  label:{fontSize:11,color:C.muted,marginBottom:3,display:"block"},
  input:{width:"100%",padding:"8px 10px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,background:C.warm,color:C.charcoal,boxSizing:"border-box",outline:"none",fontFamily:"inherit"},
  row:{display:"flex",gap:10,marginBottom:10},
  col:{flex:1},
  btn:(v="primary")=>({padding:"9px 18px",borderRadius:8,border:v==="outline"?`1px solid ${C.sageDark}`:"none",cursor:"pointer",fontSize:13,fontWeight:600,
    background:v==="primary"?C.sageDark:v==="danger"?C.red:v==="blue"?C.blue:v==="gold"?C.gold:"white",
    color:["primary","danger","blue","gold"].includes(v)?"white":C.sageDark}),
  divider:{border:"none",borderTop:`1px solid ${C.border}`,margin:"12px 0"},
};

// ===== UTILS =====
function round15(m){
  if(m<=0) return 0;
  const rem=m%15;
  if(rem===0) return m;
  return rem<=5?m-rem:m+(15-rem);
}

function calcServiceFee(svc, minutes){
  if(!svc.hasTime) return svc.basePrice;
  if(minutes<=svc.timeUnit) return svc.basePrice;
  const extra=Math.ceil((minutes-svc.timeUnit)/svc.timeUnit)*svc.extraPrice;
  return svc.basePrice+extra;
}

// ===== MAIN APP =====
function App(){
  const [settings]=useState(DEFAULT_SETTINGS);
  const [screen,setScreen]=useState("calc"); // calc | result | settings
  const [companyName,setCompanyName]=useState("");
  const [date,setDate]=useState(new Date().toISOString().slice(0,10));
  const [entryTime,setEntryTime]=useState("");
  const [exitTime,setExitTime]=useState("");
  const [selectedServices,setSelectedServices]=useState([]);
  const [serviceMins,setServiceMins]=useState({});
  const [addonValues,setAddonValues]=useState({});
  const [memo,setMemo]=useState("");

  // 料金計算
  const calcResult=()=>{
    const rows=[];
    let subtotal=0;

    // サービス料金
    selectedServices.forEach(id=>{
      const svc=settings.services.find(s=>s.id===id);
      if(!svc) return;
      const mins=parseInt(serviceMins[id])||0;
      const m=svc.hasTime?round15(mins||totalMin):0;
      const fee=calcServiceFee(svc,m);
      rows.push({label:`${svc.name}${svc.hasTime&&m>0?`（${m}分）`:""}`,amount:fee,type:"service"});
      subtotal+=fee;
    });

    // 加算
    Object.entries(addonValues).forEach(([id,val])=>{
      const addon=settings.addons.find(a=>a.id===id);
      if(!addon||!val||parseFloat(val)===0) return;
      const v=parseFloat(val)||0;
      if(id==="a8"){
        // 時間外加算（自動）
        const rate=parseFloat(val)/100;
        const extra=Math.round(subtotal*rate);
        rows.push({label:`${addon.name}（+${val}%）`,amount:extra,type:"addon"});
        subtotal+=extra;
      } else {
        const fee=Math.round(addon.pricePerUnit*v);
        rows.push({label:`${addon.name}（${v}${addon.unitLabel}）`,amount:fee,type:"addon"});
        subtotal+=fee;
      }
    });

    return {rows,total:subtotal};
  };

  // 入退室から総時間
  const totalMin=(()=>{
    if(!entryTime||!exitTime) return 0;
    const [eh,em]=entryTime.split(":").map(Number);
    const [xh,xm]=exitTime.split(":").map(Number);
    return Math.max(0,(xh*60+xm)-(eh*60+em));
  })();

  const result=calcResult();
  const nowStr=()=>{const n=new Date();return`${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;};

  const toggleService=(id)=>{
    setSelectedServices(prev=>prev.includes(id)?prev.filter(s=>s!==id):[...prev,id]);
  };

  // LINE共有
  const shareToLine=()=>{
    const lines=[
      `【訪問ケア料金明細】`,
      companyName?`事業所：${companyName}`:"",
      `日付：${date}`,
      entryTime&&exitTime?`時間：${entryTime}〜${exitTime}（${totalMin}分）`:"",
      ``,
      `■ 内訳`,
      ...result.rows.map(r=>`${r.label}　${r.amount.toLocaleString()}円`),
      ``,
      `■ 合計　${result.total.toLocaleString()}円`,
      memo?`\nメモ：${memo}`:"",
    ].filter(l=>l!==undefined).join("\n");
    const url=`https://line.me/R/msg/text/?${encodeURIComponent(lines)}`;
    window.open(url,"_blank");
  };

  // PDF出力
  const printPDF=()=>window.print();

  if(screen==="result"){
    return(
      <div style={{background:C.cream,minHeight:"100vh"}}>
        {/* ヘッダー */}
        <div style={{background:C.sageDark,color:"white",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}} className="no-print">
          <button onClick={()=>setScreen("calc")} style={{background:"none",border:"none",color:"white",cursor:"pointer",fontSize:18}}>←</button>
          <span style={{fontSize:15,fontWeight:700}}>料金明細</span>
          <span/>
        </div>

        {/* 明細カード（印刷対象） */}
        <div style={{padding:"16px 14px",maxWidth:600,margin:"0 auto"}}>
          <div style={{...S.card,border:`2px solid ${C.sageDark}`}} className="print-area">
            {/* ヘッダー */}
            <div style={{textAlign:"center",marginBottom:16,paddingBottom:12,borderBottom:`1px solid ${C.border}`}}>
              <div style={{fontSize:18,fontWeight:700,color:C.sageDark,marginBottom:4}}>訪問ケア料金明細書</div>
              {companyName&&<div style={{fontSize:13,color:C.muted}}>{companyName}</div>}
            </div>

            {/* 基本情報 */}
            <div style={{display:"flex",gap:16,marginBottom:14,fontSize:13}}>
              <div><span style={{color:C.muted}}>日付：</span>{date}</div>
              {entryTime&&exitTime&&<div><span style={{color:C.muted}}>時間：</span>{entryTime}〜{exitTime}（{totalMin}分）</div>}
            </div>

            {/* 内訳 */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:8}}>■ 内訳</div>
              {result.rows.map((r,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
                  <span style={{fontSize:13}}>{r.label}</span>
                  <span style={{fontSize:13,fontWeight:600}}>{r.amount.toLocaleString()}円</span>
                </div>
              ))}
            </div>

            {/* 合計 */}
            <div style={{background:C.goldLight,borderRadius:8,padding:"12px 16px",border:`1px solid #E8C840`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:15,fontWeight:700}}>合計金額</span>
                <span style={{fontSize:22,fontWeight:700,color:C.gold}}>{result.total.toLocaleString()}円</span>
              </div>
            </div>

            {memo&&(
              <div style={{marginTop:12,padding:"10px 12px",background:C.cream,borderRadius:8}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:3}}>メモ</div>
                <div style={{fontSize:13}}>{memo}</div>
              </div>
            )}

            <div style={{marginTop:14,textAlign:"center",fontSize:10,color:C.muted}}>
              この明細書は概算です。正式な請求書は別途発行いたします。
            </div>
          </div>

          {/* アクションボタン */}
          <div style={{display:"flex",flexDirection:"column",gap:10}} className="no-print">
            <button onClick={shareToLine} style={{...S.btn("primary"),width:"100%",padding:"13px",fontSize:15,background:"#06C755"}}>
              📱 LINEで送る
            </button>
            <button onClick={printPDF} style={{...S.btn("blue"),width:"100%",padding:"13px",fontSize:15}}>
              🖨️ PDF・印刷
            </button>
            <button onClick={()=>setScreen("calc")} style={{...S.btn("outline"),width:"100%",padding:"12px",fontSize:14}}>
              ← 計算画面に戻る
            </button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{background:C.cream,minHeight:"100vh"}}>
      {/* ヘッダー */}
      <div style={{background:C.sageDark,color:"white",padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
        <span style={{fontSize:16,fontWeight:700}}>🌱 訪問ケア料金計算</span>
        <button onClick={()=>setScreen("settings")} style={{background:"none",border:"1px solid rgba(255,255,255,0.4)",color:"white",cursor:"pointer",fontSize:11,borderRadius:6,padding:"3px 10px"}}>設定</button>
      </div>

      <div style={{padding:"14px 12px",maxWidth:680,margin:"0 auto"}}>

        {/* 事業所名・日付 */}
        <div style={S.card}>
          <div style={S.title}>📋 基本情報</div>
          <div style={{marginBottom:10}}>
            <label style={S.label}>事業所名（任意）</label>
            <input style={S.input} placeholder="〇〇訪問サービス" value={companyName} onChange={e=>setCompanyName(e.target.value)}/>
          </div>
          <div style={S.row}>
            <div style={S.col}><label style={S.label}>日付</label><input style={S.input} type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          </div>
          <div style={S.row}>
            <div style={S.col}><label style={S.label}>開始時刻</label>
              <div style={{display:"flex",gap:6"}}>
                <input style={S.input} type="time" value={entryTime} onChange={e=>setEntryTime(e.target.value)}/>
                <button onClick={()=>setEntryTime(nowStr())} style={{...S.btn("outline"),fontSize:11,padding:"6px 10px",whiteSpace:"nowrap"}}>今</button>
              </div>
            </div>
            <div style={S.col}><label style={S.label}>終了時刻</label>
              <div style={{display:"flex",gap:6}}>
                <input style={S.input} type="time" value={exitTime} onChange={e=>setExitTime(e.target.value)}/>
                <button onClick={()=>setExitTime(nowStr())} style={{...S.btn("outline"),fontSize:11,padding:"6px 10px",whiteSpace:"nowrap"}}>今</button>
              </div>
            </div>
          </div>
          {totalMin>0&&<div style={{textAlign:"center",fontSize:13,color:C.sageDark,fontWeight:600,background:C.greenLight,borderRadius:8,padding:"6px"}}>総支援時間：{Math.floor(totalMin/60)>0?`${Math.floor(totalMin/60)}時間`+`${totalMin%60>0?totalMin%60+"分":""}`:totalMin+"分"}</div>}
        </div>

        {/* サービス選択 */}
        <div style={S.card}>
          <div style={S.title}>🏠 サービス内容</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {settings.services.map(svc=>{
              const checked=selectedServices.includes(svc.id);
              return(
                <div key={svc.id}>
                  <label style={{display:"flex",alignItems:"center",gap:9,padding:"9px 11px",borderRadius:checked?"8px 8px 0 0":8,background:checked?"#EBF4EE":C.warm,border:`1px solid ${checked?C.sageDark:C.border}`,cursor:"pointer"}}>
                    <input type="checkbox" checked={checked} onChange={()=>toggleService(svc.id)} style={{width:16,height:16,accentColor:C.sageDark}}/>
                    <span style={{flex:1,fontSize:13,fontWeight:checked?600:400,color:checked?C.sageDark:C.charcoal}}>{svc.name}</span>
                    <span style={{fontSize:11,color:C.muted}}>{svc.basePrice.toLocaleString()}円〜</span>
                  </label>
                  {checked&&svc.hasTime&&(
                    <div style={{padding:"8px 11px",background:"#D8EDE0",borderRadius:"0 0 8px 8px",border:`1px solid ${C.sageDark}`,borderTop:"none",display:"flex",alignItems:"center",gap:8}}>
                      <label style={{fontSize:11,color:C.sageDark,whiteSpace:"nowrap"}}>時間（分）</label>
                      <input type="number" min="0" placeholder={`例）${svc.timeUnit}`} value={serviceMins[svc.id]||""} onChange={e=>setServiceMins(p=>({...p,[svc.id]:e.target.value}))}
                        style={{...S.input,width:90,background:"white"}}/>
                      <span style={{fontSize:11,color:C.muted}}>分</span>
                      {serviceMins[svc.id]&&<span style={{fontSize:12,color:C.sageDark,fontWeight:600}}>
                        {calcServiceFee(svc,round15(parseInt(serviceMins[svc.id])||0)).toLocaleString()}円
                      </span>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* 加算・オプション */}
        <div style={S.card}>
          <div style={S.title}>➕ 加算・オプション</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {settings.addons.map(addon=>{
              const val=addonValues[addon.id]||"";
              const isOvertimeAddon=addon.id==="a8";
              return(
                <div key={addon.id} style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{flex:1,fontSize:12,color:C.charcoal}}>{addon.name}</span>
                  {isOvertimeAddon?(
                    <select value={val} onChange={e=>setAddonValues(p=>({...p,[addon.id]:e.target.value}))}
                      style={{...S.input,width:110,fontSize:11}}>
                      <option value="">なし</option>
                      <option value="20">+20%（早朝/夕方）</option>
                      <option value="40">+40%（夜間/深夜）</option>
                    </select>
                  ):(
                    <>
                      <input type="number" min="0" placeholder="0" value={val} onChange={e=>setAddonValues(p=>({...p,[addon.id]:e.target.value}))}
                        style={{...S.input,width:70,textAlign:"right"}}/>
                      <span style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{addon.unitLabel}</span>
                      {val&&parseFloat(val)>0&&addon.id!=="a8"&&(
                        <span style={{fontSize:11,color:C.sageDark,fontWeight:600,whiteSpace:"nowrap"}}>
                          {Math.round(addon.pricePerUnit*parseFloat(val)).toLocaleString()}円
                        </span>
                      )}
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* メモ */}
        <div style={S.card}>
          <div style={S.title}>📝 メモ（任意）</div>
          <textarea style={{...S.input,minHeight:60,resize:"vertical"}} placeholder="特記事項など..." value={memo} onChange={e=>setMemo(e.target.value)}/>
        </div>

        {/* 料金プレビュー */}
        {result.rows.length>0&&(
          <div style={{...S.card,background:C.goldLight,border:"1px solid #E8C840"}}>
            <div style={{fontSize:13,fontWeight:700,color:C.gold,marginBottom:8}}>💴 料金プレビュー</div>
            {result.rows.map((r,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                <span>{r.label}</span><span style={{fontWeight:600}}>{r.amount.toLocaleString()}円</span>
              </div>
            ))}
            <hr style={S.divider}/>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:19,fontWeight:700,color:C.gold}}>
              <span>合計</span><span>{result.total.toLocaleString()}円</span>
            </div>
          </div>
        )}

        {/* 明細へ進むボタン */}
        <button
          onClick={()=>{ if(result.rows.length===0){alert("サービスを選択してください");return;} setScreen("result"); }}
          style={{...S.btn("primary"),width:"100%",padding:"14px",fontSize:15,marginBottom:20}}
        >
          明細を見る・共有する →
        </button>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
